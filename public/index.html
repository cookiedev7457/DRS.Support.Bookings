<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DRS Support Bookings</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-login { background: #0084ff; color: white; }
        .btn-create { background: #28a745; color: white; }
        .btn-cancel { background: #dc3545; color: white; font-size: 12px; }
        .session-card { background: #3d3d3d; padding: 15px; margin: 15px 0; border-radius: 8px; border-left: 5px solid #0084ff; text-align: left; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DRS Booking System</h1>
        
        <div id="login-view">
            <button class="btn btn-login" onclick="login()">Login with Roblox</button>
        </div>

        <div id="dashboard" class="hidden">
            <p>Welcome, <span id="username-display"></span>!</p>
            <div id="admin-tools" class="hidden">
                <button class="btn btn-create" onclick="createSession()">+ Create Session</button>
            </div>
            <hr>
            <h3>Active Sessions</h3>
            <div id="session-list">Loading...</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const user = {
            name: params.get('username'),
            id: params.get('userId'),
            rank: parseInt(params.get('rank')) || 0
        };

        if (user.name) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('username-display').innerText = user.name;
            if (user.rank >= 98) document.getElementById('admin-tools').classList.remove('hidden');
            fetchSessions();
        }

        function login() {
            // Replace with your actual Render Client ID and Redirect URI
            const clientId = "YOUR_ROBLOX_CLIENT_ID";
            const redirect = encodeURIComponent("https://your-app-name.onrender.com/callback");
            window.location.href = `https://apis.roblox.com/oauth/v1/authorize?client_id=${clientId}&redirect_uri=${redirect}&scope=openid+profile&response_type=code`;
        }

        async function fetchSessions() {
            const res = await fetch('/api/sessions');
            const sessions = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = sessions.length ? sessions.map(s => `
                <div class="session-card">
                    <strong>${s.sessionName}</strong><br>
                    Host: ${s.hostName}
                    ${user.rank >= 98 ? `<button class="btn btn-cancel" onclick="cancelSession('${s._id}')">Cancel</button>` : ''}
                </div>
            `).join('') : "No active sessions found.";
        }

        async function createSession() {
            const name = prompt("Enter Session Name:");
            if (!name) return;
            await fetch('/api/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, ...user })
            });
            fetchSessions();
        }

        async function cancelSession(id) {
            if (!confirm("Cancel this session?")) return;
            await fetch('/api/cancel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, rank: user.rank })
            });
            fetchSessions();
        }
    </script>
</body>
</html>
