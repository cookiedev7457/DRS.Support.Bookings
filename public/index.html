<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRS Trainings</title>
    <style>
        :root { --primary: #0084ff; --bg: #121212; --card: #1e1e1e; --text: #fff; --red: #ff4747; --gray: #888; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .session-card { background: #252525; padding: 20px; margin: 15px 0; border-radius: 10px; border-left: 5px solid var(--primary); }
        .tag { font-size: 10px; padding: 4px 10px; border-radius: 4px; margin-right: 6px; font-weight: bold; text-transform: uppercase; background: #444; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--red); color: white; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-disabled { background: #333; color: #666; cursor: not-allowed; }
        .req-box { background: #1a1a1a; padding: 10px; border-radius: 6px; margin: 12px 0; font-size: 13px; color: #ccc; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="header">
            <h2 style="margin:0;">DRS Trainings</h2>
            <button id="auth-btn" class="btn btn-blue" style="width:auto;" onclick="login()">Login with Roblox</button>
        </div>
        <p id="user-display">Guest Mode</p>
        <div id="session-list">Loading sessions...</div>
    </div>

    <script>
        const RENDER_URL = "https://drs-support-bookings.onrender.com";
        let user = { username: null, loggedIn: false, rank: 0 };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const uname = params.get('username');
            const rank = parseInt(params.get('rank')) || 0;

            if (uname) {
                if (rank < 45) {
                    showUnauthorized(rank);
                    return;
                }
                user = { username: uname, loggedIn: true, rank: rank };
                document.getElementById('user-display').innerText = `Logged in: ${uname} (Rank ${rank})`;
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => location.href = window.location.pathname;
            }
            fetchSessions();
        };

        function login() {
            window.location.href = "https://authorize.roblox.com/?client_id=3883210808784608768&response_type=code&redirect_uri=https%3A%2F%2Fdrs-support-bookings.onrender.com%2Fcallback&scope=openid+profile&step=accountConfirm";
        }

        function showUnauthorized(rank) {
            document.getElementById('main-container').innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h1 style="color:var(--red); font-size:50px;">🚫</h1>
                    <h2>Access Denied</h2>
                    <p>Rank 45+ Required. Your Rank: ${rank}</p>
                    <button class="btn btn-outline" onclick="location.href='index.html'">Return</button>
                </div>`;
        }

        async function fetchSessions() {
            try {
                const res = await fetch(`${RENDER_URL}/api/sessions`);
                const sessions = await res.json();
                const list = document.getElementById('session-list');
                
                list.innerHTML = sessions.map(s => {
                    const isBooked = s.participants.includes(user.username);
                    const isHost = user.username === s.hostName;
                    
                    return `
                        <div class="session-card">
                            <div style="margin-bottom:10px;">
                                ${s.tags.map(t => `<span class="tag" style="background:${t.color === 'blue_light' ? '#0084ff' : '#444'}">${t.name}</span>`).join('')}
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <strong>${s.sessionName}</strong>
                                <span style="color:var(--primary); font-size:12px;">Host: ${s.hostName}</span>
                            </div>
                            <div class="req-box"><strong>Req:</strong> ${s.requirements}</div>
                            <p style="font-size:12px; color:var(--gray);">Attendees: ${s.participants.length}</p>

                            ${!user.loggedIn ? `<button class="btn btn-outline" onclick="login()">Login to Book</button>` : 
                                (isHost ? `<button class="btn btn-disabled" disabled>You are Hosting</button>` : 
                                    (isBooked ? 
                                        `<button class="btn btn-red" onclick="unbook('${s.id}', '${s.sessionName}')">Unbook Spot</button>` : 
                                        `<button class="btn btn-blue" onclick="join('${s.id}', '${s.sessionName}', '${s.hostName}')">Book Spot</button>`)
                                )
                            }
                        </div>`;
                }).join('') || "No active sessions.";
            } catch (e) { document.getElementById('session-list').innerHTML = "Offline."; }
        }

        async function join(cardId, sessionName, hostName) {
            const res = await fetch(`${RENDER_URL}/api/join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cardId, username: user.username, sessionName, hostName })
            });
            if (res.ok) fetchSessions(); else { const d = await res.json(); alert(d.error); }
        }

        async function unbook(cardId, sessionName) {
            await fetch(`${RENDER_URL}/api/unbook`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cardId, username: user.username, sessionName })
            });
            fetchSessions();
        }
    </script>
</body>
</html>
