<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRS Booking</title>
    <style>
        :root { --primary: #0084ff; --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: #dc3545; color: white; }
        .session-card { background: #252525; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid var(--primary); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DRS Sessions</h1>
        <div id="user-bar" style="margin-bottom: 20px; display: flex; justify-content: space-between;">
            <span id="user-info">Guest Mode</span>
            <button id="auth-btn" class="btn btn-blue" onclick="login()">Login</button>
        </div>

        <div id="admin-tools" class="hidden">
            <button class="btn btn-blue" style="background: #28a745;" onclick="createSession()">+ New Session</button>
        </div>

        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        <div id="session-list">Loading sessions...</div>
    </div>

    <script>
        const RENDER_URL = "https://drs-support-bookings.onrender.com";
        let user = { isLoggedIn: false, userId: null, username: null, rank: 0 };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const uid = params.get('userId');
            const uname = params.get('username');

            if (uid) {
                user.userId = uid;
                user.username = uname;
                
                // 1. WIPE URL IMMEDIATELY (Safety)
                window.history.replaceState({}, document.title, window.location.pathname);

                // 2. ASK SERVER FOR REAL RANK
                const res = await fetch(`${RENDER_URL}/api/check-rank?userId=${uid}`);
                const data = await res.json();
                
                user.rank = data.rank;
                user.isLoggedIn = true;

                document.getElementById('user-info').innerText = `Hello, ${uname}`;
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => location.href = window.location.pathname;

                if (data.isAdmin) document.getElementById('admin-tools').classList.remove('hidden');
            }
            fetchSessions();
        };

        async function fetchSessions() {
            const res = await fetch(`${RENDER_URL}/api/sessions`);
            const sessions = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = sessions.map(s => `
                <div class="session-card">
                    <strong>${s.sessionName}</strong><br>
                    <small>Host: ${s.hostName}</small><br>
                    <p>${s.participants.length} Booked</p>
                    ${!user.isLoggedIn ? `<button class="btn" onclick="login()">Login to Book</button>` : 
                      user.rank >= 98 ? `<button class="btn btn-red" onclick="endSession('${s._id}')">End</button>` :
                      `<button class="btn btn-blue" onclick="joinSession('${s._id}')">Book Spot</button>`}
                </div>
            `).join('') || "No active sessions.";
        }

        function login() {
            window.location.href = "https://authorize.roblox.com/?client_id=3883210808784608768&response_type=code&redirect_uri=https%3A%2F%2Fdrs-support-bookings.onrender.com%2Fcallback&scope=openid+profile";
        }

        async function createSession() {
            const name = prompt("Session Name:");
            if(!name) return;
            await fetch(`${RENDER_URL}/api/create`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, userId: user.userId, username: user.username })
            });
            fetchSessions();
        }

        async function joinSession(sessionId) {
            await fetch(`${RENDER_URL}/api/join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sessionId, userId: user.userId, username: user.username })
            });
            fetchSessions();
        }

        async function endSession(id) {
            await fetch(`${RENDER_URL}/api/cancel`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, userId: user.userId })
            });
            fetchSessions();
        }
    </script>
</body>
</html>
