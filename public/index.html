<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRS Sessions</title>
    <style>
        :root { --primary: #0084ff; --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .session-card { background: #252525; padding: 20px; margin: 15px 0; border-radius: 10px; border-left: 4px solid var(--primary); }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn:hover { opacity: 0.8; }
        .req-box { font-size: 13px; color: #ccc; background: #1a1a1a; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">DRS Trainings</h2>
            <button id="auth-btn" class="btn btn-blue" style="width:auto;" onclick="login()">Login</button>
        </div>
        <p id="user-info" style="color:#888; font-size:14px;">Guest Mode</p>
        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        <div id="session-list">Loading sessions from Trello...</div>
    </div>

    <script>
        const RENDER_URL = "https://drs-support-bookings.onrender.com";
        let user = { isLoggedIn: false, username: null };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const uname = params.get('username');

            if (uname) {
                user = { username: uname, isLoggedIn: true };
                // Wipe the URL for security
                window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById('user-info').innerText = `Welcome, ${uname}`;
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => location.href = window.location.pathname;
            }
            fetchSessions();
        };

        function login() {
            window.location.href = "https://authorize.roblox.com/?client_id=3883210808784608768&response_type=code&redirect_uri=https%3A%2F%2Fdrs-support-bookings.onrender.com%2Fcallback&scope=openid+profile";
        }

        async function fetchSessions() {
            try {
                const res = await fetch(`${RENDER_URL}/api/sessions`);
                const sessions = await res.json();
                const list = document.getElementById('session-list');
                
                list.innerHTML = sessions.map(s => `
                    <div class="session-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${s.sessionName}</strong>
                            <span style="font-size:11px; color:var(--primary);">Host: ${s.hostName}</span>
                        </div>
                        <div class="req-box"><b>Requirements:</b> ${s.requirements}</div>
                        <p style="font-size:12px; margin:10px 0;">Status: ${s.participants} staff booked</p>
                        ${!user.isLoggedIn ? 
                            `<button class="btn btn-outline" onclick="login()">Login to Book</button>` : 
                            `<button class="btn btn-blue" onclick="joinSession('${s.id}')">Book Spot</button>`}
                    </div>
                `).join('') || "No active sessions found.";
            } catch (e) {
                document.getElementById('session-list').innerText = "Failed to load sessions. Check if Render is awake.";
            }
        }

        async function joinSession(cardId) {
            const res = await fetch(`${RENDER_URL}/api/join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cardId, username: user.username })
            });
            if (res.ok) {
                alert("Successfully Booked! Check Trello.");
                fetchSessions();
            }
        }
    </script>
</body>
</html>
