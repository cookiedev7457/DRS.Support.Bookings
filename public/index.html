<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRS Trainings</title>
    <style>
        :root { --primary: #0084ff; --bg: #121212; --card: #1e1e1e; --text: #fff; --red: #ff4747; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .session-card { background: #252525; padding: 20px; margin: 15px 0; border-radius: 10px; border-left: 5px solid var(--primary); }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; margin-right: 5px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .host-tag { font-size: 11px; color: var(--primary); background: #333; padding: 4px 8px; border-radius: 4px; }
        .req-text { font-size: 13px; color: #aaa; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>DRS Trainings</h2>
            <button id="auth-btn" class="btn btn-blue" style="width:auto; margin:0;" onclick="login()">Login</button>
        </div>
        <p id="user-display" style="color:#666; font-size:13px;">Guest Mode</p>
        <div id="session-list">Loading...</div>
    </div>

    <script>
        const RENDER_URL = "https://drs-support-bookings.onrender.com";
        let user = { username: null, loggedIn: false };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const uname = params.get('username');
            if (uname) {
                user = { username: uname, loggedIn: true };
                document.getElementById('user-display').innerText = `Welcome, ${uname}`;
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => location.href = window.location.pathname;
            }
            fetchSessions();
        };

        function login() {
            window.location.href = "https://authorize.roblox.com/?client_id=3883210808784608768&response_type=code&redirect_uri=https%3A%2F%2Fdrs-support-bookings.onrender.com%2Fcallback&scope=openid+profile";
        }

        async function fetchSessions() {
            try {
                const res = await fetch(`${RENDER_URL}/api/sessions`);
                const sessions = await res.json();
                const list = document.getElementById('session-list');
                
                list.innerHTML = sessions.map(s => {
                    const isBooked = s.participants.includes(user.username);
                    return `
                        <div class="session-card">
                            <div>
                                ${s.tags.map(t => `<span class="tag" style="background:${t.color === 'blue_light' ? '#0084ff' : '#444'}">${t.name}</span>`).join('')}
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <strong>${s.sessionName}</strong>
                                <span class="host-tag">Host: ${s.hostName}</span>
                            </div>
                            <p class="req-text">Req: ${s.requirements}</p>
                            <p style="font-size:12px; color:#666;">Booked: ${s.participants.length} staff</p>
                            ${user.loggedIn ? 
                                (isBooked ? 
                                    `<button class="btn btn-red" onclick="unbook('${s.id}')">Unbook Spot</button>` : 
                                    `<button class="btn btn-blue" onclick="join('${s.id}')">Book Spot</button>`) : 
                                `<button class="btn btn-outline" onclick="login()">Login to Book</button>`
                            }
                        </div>
                    `;
                }).join('') || "No active sessions.";
            } catch (e) { list.innerHTML = "Offline."; }
        }

        async function join(cardId) {
            await fetch(`${RENDER_URL}/api/join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cardId, username: user.username })
            });
            fetchSessions();
        }

        async function unbook(cardId) {
            await fetch(`${RENDER_URL}/api/unbook`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ cardId, username: user.username })
            });
            fetchSessions();
        }
    </script>
</body>
</html>
