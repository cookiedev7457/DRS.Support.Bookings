<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRS | Staff Portal</title>
    <style>
        :root { --primary: #0084ff; --bg: #050505; --card: #121212; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .main-banner { width: 100%; max-width: 450px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px; }
        
        /* Input Styling */
        .user-input-box { margin-bottom: 20px; text-align: center; }
        input[type="text"] { background: #000; border: 1px solid #444; color: white; padding: 12px; width: 80%; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,132,255,0.2); }

        .session-card { background: #1a1a1a; padding: 20px; margin: 15px 0; border-radius: 12px; border-left: 4px solid var(--primary); }
        .tag { font-size: 10px; padding: 5px 12px; border-radius: 5px; margin-right: 8px; font-weight: 800; color: #000; text-transform: uppercase; display: inline-block; margin-bottom: 12px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; background: var(--primary); color: white; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        .req-box { background: #000; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 13px; color: #ddd; border: 1px solid #222; }
        .corner-logo { position: fixed; bottom: 20px; right: 20px; width: 45px; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/WbgtW4FK/d-DRSFull-No-Background.png" alt="DRS" class="main-banner">

    <div class="container">
        <div class="header">
            <h2 style="margin:0; letter-spacing: 2px;">STAFF PORTAL</h2>
        </div>

        <div class="user-input-box">
            <p style="font-size: 12px; color: var(--primary); margin-bottom: 8px; font-weight: bold;">ENTER ROBLOX USERNAME TO BOOK</p>
            <input type="text" id="roblox-user" placeholder="Username..." oninput="saveName()">
        </div>
        
        <div id="session-list">Loading sessions...</div>
    </div>

    <img src="https://i.postimg.cc/CKL1xHv7/d-No-Background.png" class="corner-logo">

    <script>
        const RENDER_URL = "https://drs-support-bookings.onrender.com";

        function saveName() {
            localStorage.setItem('drs_username', document.getElementById('roblox-user').value);
        }

        window.onload = () => {
            const saved = localStorage.getItem('drs_username');
            if(saved) document.getElementById('roblox-user').value = saved;
            fetchSessions();
        };

        async function fetchSessions() {
            try {
                const res = await fetch(`${RENDER_URL}/api/sessions`);
                const data = await res.json();
                document.getElementById('session-list').innerHTML = data.map(s => `
                    <div class="session-card">
                        ${s.tags.map(t => `<span class="tag" style="background:${t.color}">${t.name}</span>`).join('')}
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${s.name}</strong>
                            <span style="color:var(--primary); font-size:11px;">HOST: ${s.host}</span>
                        </div>
                        <div class="req-box">${s.requirements}</div>
                        <button class="btn" onclick="join('${s.checklistId}')">RESERVE SPOT</button>
                    </div>`).join('');
            } catch (e) { document.getElementById('session-list').innerText = "Database Offline"; }
        }

        async function join(id) {
            const user = document.getElementById('roblox-user').value.trim();
            if(!user) return alert("Please enter your Roblox username first!");

            const res = await fetch(`${RENDER_URL}/api/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, checklistId: id })
            });
            const data = await res.json();
            if (res.ok) { alert("Successfully Joined!"); fetchSessions(); }
            else { alert(data.error || "Failed to join."); }
        }
    </script>
</body>
</html>
